exclude: '^.*\.ipynb$|^.*\.csv$'

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v3.4.0
    hooks:
        - id: end-of-file-fixer
        - id: trailing-whitespace
        - id: check-yaml
        - id: debug-statements
        - id: detect-private-key
        - id: requirements-txt-fixer
  - repo: https://github.com/pycqa/isort
    rev: 5.13.2
    hooks:
        - id: isort
          args: ['--profile', 'black']
  - repo: https://github.com/psf/black
    rev: 24.2.0
    hooks:
        - id: black
  - repo: https://github.com/pycqa/flake8
    rev: 7.0.0
    hooks:
      - id: flake8
        additional_dependencies: [flake8-print]
        args: ['--ignore=F403,F405,E501,W503,E203']
  - repo: local
    hooks:
      - id: custom-keyword-args
        name: Custom Keyword Argument Rule
        language: system
        pass_filenames: false
        entry: bash -c 'PYTHONPATH=. .venv/bin/pylint . --ignore=.venv --load-plugins=custom_rule --disable=all --enable=non-keyword-args --score=n'
  - repo: https://github.com/jendrikseipp/vulture
    rev: 'v2.3'
    hooks:
      - id: vulture
        args: [
          '.',
          '--exclude', '.venv/,custom_rule.py',
          '--ignore-decorators', '@pytest.mark.parametrize,@pytest.fixture',
          '--ignore-names', 'chained_assignment,return_value'
        ]
